# https://taskfile.dev — lanceur de commandes pour data-triathlon
#
# Installation : https://taskfile.dev/installation/  (ou `brew install go-task`)
# Usage        : `task` (liste les tâches) puis `task <nom>`
#
# Convention de nommage :
#   b:*  → backend/   (FastAPI + SQLAlchemy + Alembic)
#   f:*  → frontend/  (Next.js + TypeScript + Tailwind)
#   docker:* → docker-compose (pile full-stack locale)
# Les tâches sans préfixe sont des raccourcis qui agissent sur l'ensemble de la pile.
#
# Prérequis backend : uv (https://docs.astral.sh/uv/). Aucun venv à activer :
# `uv run` synchronise l'environnement depuis uv.lock avant d'exécuter.

version: '3'

tasks:
  default:
    desc: Affiche la liste des tâches disponibles
    cmds:
      - task --list
    silent: true

  # ──────────────────────────────────────────────────────────────────────────
  # Raccourcis pile complète
  # ──────────────────────────────────────────────────────────────────────────
  install:
    desc: Installe toutes les dépendances (backend + frontend)
    cmds:
      - task: b:install
      - task: f:install

  dev:
    desc: Lance backend (:8001) ET frontend (:3000) en parallèle
    deps: [b:dev, f:dev]

  test:
    desc: Tests unitaires backend + frontend (sans réseau)
    cmds:
      - task: b:test
      - task: f:test

  lint:
    desc: Lint backend + frontend
    cmds:
      - task: b:lint
      - task: f:lint

  build:
    desc: Build de production frontend
    cmds:
      - task: f:build

  # ──────────────────────────────────────────────────────────────────────────
  # backend/ (FastAPI + SQLAlchemy + Alembic)
  # ──────────────────────────────────────────────────────────────────────────
  b:install:
    desc: 'backend : installe les dépendances (uv sync, dev inclus)'
    dir: backend
    cmds:
      - uv sync

  b:dev:
    desc: 'backend : serveur API + /docs sur :8001 (reload)'
    dir: backend
    cmds:
      - uv run uvicorn app.main:app --reload --port 8001

  b:migrate:
    desc: 'backend : applique les migrations Alembic (upgrade head)'
    dir: backend
    cmds:
      - uv run alembic upgrade head

  b:migration:
    desc: 'backend : nouvelle migration auto — usage : task b:migration -- "message"'
    dir: backend
    cmds:
      - uv run alembic revision --autogenerate -m "{{.CLI_ARGS}}"

  b:reset-db:
    desc: 'backend : reset base dev SQLite (vide + migre + seed démo) — args : task b:reset-db -- --no-seed --yes'
    dir: backend
    cmds:
      - uv run python scripts/reset_db.py {{.CLI_ARGS}}

  b:test:
    desc: 'backend : tests unitaires (sans réseau)'
    dir: backend
    cmds:
      - uv run pytest -m "not integration"

  b:test:integration:
    desc: 'backend : tests d''intégration (réseau réel, scrapers)'
    dir: backend
    cmds:
      - uv run pytest -m integration

  b:test:all:
    desc: 'backend : tous les tests (unitaires + intégration)'
    dir: backend
    cmds:
      - uv run pytest

  b:lint:
    desc: 'backend : lint ruff'
    dir: backend
    cmds:
      - uv run ruff check .

  b:lint:fix:
    desc: 'backend : lint ruff avec corrections automatiques'
    dir: backend
    cmds:
      - uv run ruff check --fix .

  # ──────────────────────────────────────────────────────────────────────────
  # frontend/ (Next.js 16 + TypeScript + Tailwind)
  # ──────────────────────────────────────────────────────────────────────────
  f:install:
    desc: 'frontend : installe les dépendances npm'
    dir: frontend
    cmds:
      - npm install

  f:dev:
    desc: 'frontend : serveur Next.js sur :3000 (rewrites /api → :8001)'
    dir: frontend
    cmds:
      - npm run dev

  f:build:
    desc: 'frontend : build de production (TS strict + RSC)'
    dir: frontend
    cmds:
      - npm run build

  f:test:
    desc: 'frontend : tests Vitest (run unique)'
    dir: frontend
    cmds:
      - npm test

  f:test:watch:
    desc: 'frontend : tests Vitest en mode watch'
    dir: frontend
    cmds:
      - npm run test:watch

  f:lint:
    desc: 'frontend : lint ESLint'
    dir: frontend
    cmds:
      - npm run lint

  # ──────────────────────────────────────────────────────────────────────────
  # Docker Compose (pile full-stack : backend :8000 + frontend :3000)
  # ──────────────────────────────────────────────────────────────────────────
  docker:up:
    desc: 'docker : build + lance la pile (backend :8000, frontend :3000)'
    cmds:
      - docker compose up --build

  docker:down:
    desc: 'docker : arrête et supprime les conteneurs'
    cmds:
      - docker compose down
