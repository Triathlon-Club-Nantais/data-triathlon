name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  # Déclenchement manuel d'une preview depuis l'onglet Actions
  # (« Run workflow » → choix de la branche de la PR).
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Contrôles qualité (réutilise ci.yml) — aucun déploiement sans CI verte.
  ci:
    uses: ./.github/workflows/ci.yml

  # ---- PREVIEW : merge sur main OU déclenchement manuel d'une branche de PR ----
  deploy-preview:
    needs: ci
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: preview
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Render (backend) — deploy hook preview
        run: curl -fsSL -X POST --retry 3 --retry-delay 5 --retry-all-errors --max-time 60 "${{ secrets.RENDER_DEPLOY_HOOK_PREVIEW }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm i -g vercel@54 # major épinglé : évite qu'une release Vercel casse le pipeline

      - name: Vercel (frontend) — preview
        # Pas de working-directory : le Root Directory (frontend) est déjà configuré côté projet Vercel.
        run: |
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # ---- PRODUCTION : tag v* ----
  deploy-production:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Render (backend) — deploy hook prod
        run: curl -fsSL -X POST --retry 3 --retry-delay 5 --retry-all-errors --max-time 60 "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm i -g vercel@54 # major épinglé : évite qu'une release Vercel casse le pipeline

      - name: Vercel (frontend) — production
        # Pas de working-directory : le Root Directory (frontend) est déjà configuré côté projet Vercel.
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
