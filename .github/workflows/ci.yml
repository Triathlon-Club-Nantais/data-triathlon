name: CI

on:
  pull_request:
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      # --locked : échoue si uv.lock n'est pas à jour avec pyproject.toml.
      # C'est le garde-fou qui empêche une dépendance ajoutée sans lock de passer en revue.
      - name: Install dependencies
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (hors réseau)
        run: uv run pytest -m "not integration"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Tests (vitest)
        run: npm test

      - name: Typecheck + build
        run: npm run build # next build = typecheck TS strict + RSC
