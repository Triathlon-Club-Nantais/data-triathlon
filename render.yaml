services:
  - type: web
    name: triathlon-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/triathlon.db
    disk:
      name: triathlon-db
      mountPath: /data
      sizeGB: 1
