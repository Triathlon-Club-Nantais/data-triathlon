services:
  - type: web
    name: triathlon-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.13.0"
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
