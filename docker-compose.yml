services:
  backend:
    build:
      context: ./backend
    container_name: triathlon_backend
    restart: unless-stopped
    volumes:
      - db_data:/app/triathlon.db
    environment:
      - DATABASE_URL=sqlite:///./triathlon.db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: triathlon_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
